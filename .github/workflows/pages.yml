name: Deploy control surface to Pages

# Publishes the rendered design-system.html to GitHub Pages so the team can
# click through the live control surface without cloning. Rebuilds on every
# push to main, using the committed Opus proposals + fixture (deterministic).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-flight run finish rather than cancelling.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Render design-system.html → dist/index.html
        run: bun run cli/index.ts emit --proposals demo/proposals.json --out dist/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
